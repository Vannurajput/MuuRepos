<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../assets/styles/main.css">
  <link rel="stylesheet" href="popup.css">
</head>
<body class="popup-body">
  <div class="profile-popover standalone">
    <div class="profile-popover-header">
      <div class="profile-avatar">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="9" r="4" fill="none" stroke="currentColor" stroke-width="1.8" />
          <path d="M5 19c0-3.5 3.1-5 7-5s7 1.5 7 5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
        </svg>
      </div>
      <div>
        <div id="profileName" class="profile-name">Profile</div>
        <div id="profileSub" class="profile-sub">Not signed in</div>
      </div>
    </div>
    <div class="profile-actions">
      <button class="profile-action" data-act="manage">Manage profile</button>
      <button id="authButton" class="profile-action" data-act="signin">Sign in</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
