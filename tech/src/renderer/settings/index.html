<!DOCTYPE html>
<!-- settings/index.html: Chrome-style Settings popup with icons -->
<html lang="en" data-theme="light" data-skin="glass">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings</title>
    <link rel="stylesheet" href="../assets/themes/light.css" />
    <link rel="stylesheet" href="../assets/themes/dark.css" />
    <link rel="stylesheet" href="../assets/skins/classic.css" />
    <link rel="stylesheet" href="../assets/skins/glass.css" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="../assets/styles/fonts-loader.js"></script>
  </head>
  <body>
    <div class="settings-shell">
      <!-- header removed -->

      <main class="settings-content">
        <!-- New Tab -->
        <div id="settingsNewTab" class="settings-row" role="button" tabindex="0">
          <div class="settings-row-left">
            <span class="settings-row-icon" aria-hidden="true">
              <svg class="settings-icon">
                <use href="../assets/icons/mono.svg#plus"></use>
              </svg>
            </span>
            <div class="settings-row-title">New Tab</div>
          </div>
        </div>

        <!-- New Window -->
        <div id="settingsNewWindow" class="settings-row" role="button" tabindex="0">
          <div class="settings-row-left">
            <span class="settings-row-icon" aria-hidden="true">
              <svg class="settings-icon">
                <use href="../assets/icons/mono.svg#window-maximize"></use>
              </svg>
            </span>
            <div class="settings-row-title">New Window</div>
          </div>
        </div>

        <!-- Set as default browser -->
        <div id="settingsDefaultBrowser" class="settings-row" role="button" tabindex="0">
          <div class="settings-row-left">
            <span class="settings-row-icon" aria-hidden="true">
              <svg class="settings-icon">
                <use href="../assets/icons/mono.svg#star"></use>
              </svg>
            </span>
            <div class="settings-row-title">Set as default browser</div>
          </div>
        </div>

        <!-- Download -->
        <div id="settingsDownload" class="settings-row" role="button" tabindex="0">
          <div class="settings-row-left">
            <span class="settings-row-icon" aria-hidden="true">
              <svg class="settings-icon">
                <use href="../assets/icons/mono.svg#download"></use>
              </svg>
            </span>
            <div class="settings-row-title">Download</div>
          </div>
        </div>

        <!-- History -->
        <div id="settingsHistory" class="settings-row" role="button" tabindex="0">
          <div class="settings-row-left">
            <span class="settings-row-icon" aria-hidden="true">
              <svg class="settings-icon">
                <use href="../assets/icons/mono.svg#history"></use>
              </svg>
            </span>
            <div class="settings-row-title">History</div>
          </div>
        </div>

        <!-- Scheduler -->
        <div id="settingsScheduler" class="settings-row" role="button" tabindex="0">
          <div class="settings-row-left">
            <span class="settings-row-icon" aria-hidden="true">
              <svg class="settings-icon">
                <use href="../assets/icons/mono.svg#clock"></use>
              </svg>
            </span>
            <div class="settings-row-title">Scheduler</div>
          </div>
        </div>

        <!-- Skin -->
        <div class="settings-row settings-row-static" aria-label="Skin selector">
          <div class="settings-row-left">
            <span class="settings-row-icon" aria-hidden="true">
              <svg class="settings-icon">
                <use href="../assets/icons/mono.svg#sun"></use>
              </svg>
            </span>
            <div>
              <div class="settings-row-title">Skin</div>
              <div class="settings-row-meta">Applies across chrome and tools</div>
            </div>
          </div>
          <div class="settings-row-control">
            <select id="settingsSkinSelect" class="settings-select" aria-label="Select skin">
              <option value="glass">Glass / Universe</option>
              <option value="classic">Classic</option>
            </select>
          </div>
        </div>

        <!-- Credential Manager -->
        <div
          id="settingsCredentialManager"
          class="settings-row credential-row"
          role="button"
          tabindex="0">
          <div class="settings-row-left">
            <span class="settings-row-icon" aria-hidden="true">
              <svg class="settings-icon">
                <use href="../assets/icons/mono.svg#lock"></use>
              </svg>
            </span>
            <div class="settings-row-title">Credential Manager</div>
          </div>
        </div>

        <!-- Print -->
        <div id="settingsPrint" class="settings-row" role="button" tabindex="0">
          <div class="settings-row-left">
            <span class="settings-row-icon" aria-hidden="true">
              <svg class="settings-icon">
                <use href="../assets/icons/mono.svg#print"></use>
              </svg>
            </span>
            <div class="settings-row-title">Print</div>
          </div>
        </div>

        <!-- Zoom -->
        <div class="settings-row" tabindex="-1" aria-label="Zoom controls">
          <div class="settings-row-left">
            <span class="settings-row-icon" aria-hidden="true">
              <svg class="settings-icon">
                <use href="../assets/icons/mono.svg#search"></use>
              </svg>
            </span>
            <div class="settings-row-title">Zoom</div>
          </div>

          <div class="settings-row-control">
            <!-- zoom buttons (Chrome-like) -->
            <button id="settingsZoomOut" type="button" class="settings-zoom-btn">-</button>
            <button id="settingsZoomReset" type="button" class="settings-zoom-btn settings-zoom-reset">100%</button>
            <button id="settingsZoomIn" type="button" class="settings-zoom-btn">+</button>
          </div>
        </div>

        <!-- DevTools -->
        <div id="settingsDevtools" class="settings-row" role="button" tabindex="0">
          <div class="settings-row-left">
            <span class="settings-row-icon" aria-hidden="true">
              <svg class="settings-icon">
                <use href="../assets/icons/mono.svg#code"></use>
              </svg>
            </span>
            <div class="settings-row-title">DevTools</div>
          </div>
        </div>

        <!-- Exit -->
        <div id="settingsExit" class="settings-row" role="button" tabindex="0">
          <div class="settings-row-left">
            <span class="settings-row-icon" aria-hidden="true">
              <svg class="settings-icon">
                <use href="../assets/icons/mono.svg#close"></use>
              </svg>
            </span>
            <div class="settings-row-title">Exit</div>
          </div>
        </div>

        <!-- Updates -->
        <div id="settingsUpdate" class="settings-row" role="button" tabindex="0">
          <div class="settings-row-left">
            <span class="settings-row-icon" aria-hidden="true">
              <svg class="settings-icon">
                <use href="../assets/icons/mono.svg#refresh"></use>
              </svg>
            </span>
            <div>
              <div class="settings-row-title">Check for updates</div>
              <div id="settingsUpdateStatus" class="settings-row-meta">Idle</div>
            </div>
          </div>
          <div class="settings-row-control">
            <button id="settingsUpdateInstall" class="settings-zoom-btn" hidden>Restart to Update</button>
          </div>
        </div>

        <!-- Version (static, non-clickable) -->
        <div class="settings-row settings-row-static">
          <div class="settings-row-left">
            <span class="settings-row-icon" aria-hidden="true">
              <svg class="settings-icon">
                <use href="../assets/icons/mono.svg#info"></use>
              </svg>
            </span>
            <div>
              <div class="settings-row-title">Version</div>
              <div id="settingsVersionLabel" class="settings-row-meta">Loading…</div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="app.js"></script>
    <script type="module" src="zoomControls.js"></script>
    <script type="module" src="exitControl.js"></script>
  </body>
</html>
