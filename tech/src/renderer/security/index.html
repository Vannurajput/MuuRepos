<!DOCTYPE html>
<html lang="en" data-theme="light" data-skin="glass">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Security</title>
    <link rel="stylesheet" href="../assets/themes/light.css" />
    <link rel="stylesheet" href="../assets/themes/dark.css" />
    <link rel="stylesheet" href="../assets/skins/classic.css" />
    <link rel="stylesheet" href="../assets/skins/glass.css" />
    <link rel="stylesheet" href="styles.css" />
    <script defer src="../assets/styles/fonts-loader.js"></script>
  </head>
  <body>
    <div class="security-card" data-security="secure" role="dialog" aria-live="polite">
      <div class="security-header">
        <span class="security-icon" aria-hidden="true">
          <svg class="security-icon-svg">
            <use href="../assets/icons/mono.svg#lock"></use>
          </svg>
        </span>
        <div class="security-text">
          <div id="securityTitle" class="security-title">Secure connection</div>
          <div id="securityHost" class="security-host"></div>
        </div>
      </div>
      <p id="securityMessage" class="security-message"></p>
    </div>

    <script type="module" src="../theme/themeBootstrap.js"></script>
    <script defer src="index.js"></script>
  </body>
</html>
