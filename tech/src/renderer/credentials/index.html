<!DOCTYPE html>
<html lang="en" data-theme="light" data-skin="glass">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Credential Manager</title>
    <link rel="stylesheet" href="../assets/themes/light.css" />
    <link rel="stylesheet" href="../assets/themes/dark.css" />
    <link rel="stylesheet" href="../assets/skins/classic.css" />
    <link rel="stylesheet" href="../assets/skins/glass.css" />
    <link rel="stylesheet" href="../assets/styles/fonts.css" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="advanced.css" />
    <script defer src="../assets/styles/fonts-loader.js"></script>
  </head>
  <body>
    <div class="container">
      <form id="credentialForm" class="panel">
        <header class="panel-header">
          <h1>Database Credentials</h1>
        </header>

        <div class="panel-body">
          <div class="two-col">
            <label class="with-icon">
              DB Type
              <div class="input-shell">
                <span class="input-icon leading material-icons">storage</span>
                <select id="dbType" required>
                  <option value="">Select type</option>
                  <option value="mysql">MySQL</option>
                  <option value="postgres">PostgreSQL</option>
                  <option value="sqlserver">SQL Server</option>
                  <option value="sqlite">SQLite</option>
                  <option value="mongo">MongoDB</option>
                </select>
                <span class="input-icon trailing material-icons">expand_more</span>
              </div>
            </label>

            <label class="with-icon">
              Connection name
              <div class="input-shell">
                <span class="input-icon leading material-icons">person_outline</span>
                <input id="connectionName" type="text" autocomplete="off" required />
              </div>
            </label>
          </div>

          <div class="two-col">
            <label class="with-icon">
              ID
              <div class="input-shell">
                <span class="input-icon leading material-icons">badge</span>
                <input id="connectionId" type="text" autocomplete="off" />
              </div>
            </label>

            <label id="hostGroup" class="with-icon">
              Host
              <div class="input-shell">
                <span class="input-icon leading material-icons">dns</span>
                <input id="dbHost" type="text" autocomplete="off" required />
              </div>
            </label>

            <label id="portGroup" class="with-icon">
              Port
              <div class="input-shell">
                <span class="input-icon leading material-icons">settings_ethernet</span>
                <input id="dbPort" type="number" min="0" required />
              </div>
            </label>

            <label id="serverGroup" class="full-span hidden with-icon">
              Server name
              <div class="input-shell">
                <span class="input-icon leading material-icons">dns</span>
                <input id="dbServer" type="text" autocomplete="off" />
              </div>
            </label>
          </div>

          <div class="two-col">
            <label class="with-icon">
              Database
              <div class="input-shell">
                <span class="input-icon leading material-icons">storage</span>
                <input id="dbName" type="text" autocomplete="off" required />
              </div>
            </label>

            <label class="with-icon">
              User
              <div class="input-shell">
                <span class="input-icon leading material-icons">person</span>
                <input id="dbUser" type="text" autocomplete="off" required />
              </div>
            </label>
          </div>

          <div class="two-col">
            <label class="full-span with-icon">
              Password
              <div class="input-shell">
                <span class="input-icon leading material-icons">lock</span>
                <input id="dbPassword" type="password" autocomplete="off" required />
              </div>
            </label>
          </div>

          <div class="panel-subsection">
            <div class="subsection-header">
              <h2>Advanced</h2>
              <p class="subsection-hint">SSH tunnel, TLS/SSL, and cloud auth</p>
            </div>

            <div class="card-grid">
              <div class="card">
                <div class="card-header">
                  <label class="switch">
                    <input id="sshEnabled" type="checkbox" />
                    <span class="slider"></span>
                  </label>
                  <div>
                    <p class="card-title">SSH Tunnel</p>
                    <p class="card-subtitle">Connect through a bastion/jump host</p>
                  </div>
                </div>
                <div class="card-body three-col">
                  <label>
                    SSH host
                    <input id="sshHost" type="text" placeholder="bastion.example.com" />
                  </label>
                  <label>
                    SSH port
                    <input id="sshPort" type="number" min="1" placeholder="22" />
                  </label>
                  <label>
                    SSH user
                    <input id="sshUser" type="text" autocomplete="off" />
                  </label>
                  <label class="full-span">
                    SSH password
                    <input id="sshPassword" type="password" autocomplete="off" />
                  </label>
                  <label class="full-span">
                    Private key (PEM or path)
                    <textarea id="sshPrivateKey" rows="3" placeholder="-----BEGIN PRIVATE KEY-----"></textarea>
                  </label>
                  <label>
                    Key passphrase
                    <input id="sshPassphrase" type="password" autocomplete="off" />
                  </label>
                  <label>
                    Remote host override
                    <input id="sshRemoteHost" type="text" placeholder="database host if different" />
                  </label>
                  <label>
                    Remote port override
                    <input id="sshRemotePort" type="number" min="1" placeholder="3306 / 5432 / 1433" />
                  </label>
                </div>
              </div>

              <div class="card">
                <div class="card-header">
                  <label class="switch">
                    <input id="sslEnabled" type="checkbox" />
                    <span class="slider"></span>
                  </label>
                  <div>
                    <p class="card-title">TLS / SSL</p>
                    <p class="card-subtitle">Secure channel to the database</p>
                  </div>
                </div>
                <div class="card-body three-col">
                  <label>
                    Verify server cert
                    <select id="sslRejectUnauthorized">
                      <option value="true">Yes (recommended)</option>
                      <option value="false">No (allow self-signed)</option>
                    </select>
                  </label>
                  <label>
                    Server name (SNI)
                    <input id="sslServername" type="text" autocomplete="off" />
                  </label>
                  <label class="full-span">
                    CA certificate (PEM or path)
                    <textarea id="sslCa" rows="3" placeholder="-----BEGIN CERTIFICATE-----"></textarea>
                  </label>
                  <label class="full-span">
                    Client certificate (optional)
                    <textarea id="sslCert" rows="3" placeholder="-----BEGIN CERTIFICATE-----"></textarea>
                  </label>
                  <label class="full-span">
                    Client key (optional)
                    <textarea id="sslKey" rows="3" placeholder="-----BEGIN PRIVATE KEY-----"></textarea>
                  </label>
                </div>
              </div>

              <div class="card">
                <div class="card-header">
                  <label class="switch">
                    <input id="iamEnabled" type="checkbox" />
                    <span class="slider"></span>
                  </label>
                  <div>
                    <p class="card-title">Cloud IAM (AWS RDS)</p>
                    <p class="card-subtitle">Generate auth tokens for RDS</p>
                  </div>
                </div>
                <div class="card-body three-col">
                  <label>
                    AWS Region
                    <input id="iamRegion" type="text" placeholder="us-east-1" />
                  </label>
                  <label>
                    AWS Access Key
                    <input id="iamAccessKeyId" type="text" autocomplete="off" />
                  </label>
                  <label>
                    AWS Secret
                    <input id="iamSecretAccessKey" type="password" autocomplete="off" />
                  </label>
                  <label>
                    Session token (optional)
                    <input id="iamSessionToken" type="password" autocomplete="off" />
                  </label>
                  <label>
                    Override host
                    <input id="iamHost" type="text" placeholder="cluster-endpoint.rds.amazonaws.com" />
                  </label>
                  <label>
                    Override port
                    <input id="iamPort" type="number" min="1" placeholder="3306 / 5432" />
                  </label>
                </div>
              </div>
            </div>
          </div>
        </div>

        <footer class="panel-footer">
          <button type="submit" id="saveButton">Save</button>
          <button type="button" id="testButton">Test Connection</button>
          <p id="statusMessage" class="status-chip" aria-live="polite"></p>
        </footer>
      </form>
    </div>

    <script type="module" src="../theme/themeBootstrap.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
